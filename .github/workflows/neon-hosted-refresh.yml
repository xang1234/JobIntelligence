name: Neon Hosted Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * *"

concurrency:
  group: neon-hosted-refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh hosted Neon slice
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
    env:
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      ONNX_MODEL_DIR: data/models/all-MiniLM-L6-v2-onnx
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry

      - name: Cache Poetry downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-hosted-refresh-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: poetry-hosted-refresh-${{ runner.os }}-

      - name: Cache ONNX bundle
        uses: actions/cache@v4
        with:
          path: data/models/all-MiniLM-L6-v2-onnx
          key: hosted-onnx-${{ runner.os }}-all-MiniLM-L6-v2-v1

      - name: Install dependencies
        run: poetry install --with ml,ml_torch

      - name: Validate required secrets
        run: |
          if [ -z "$NEON_DATABASE_URL" ]; then
            echo "NEON_DATABASE_URL is not configured"
            exit 1
          fi

      - name: Export ONNX bundle if cache is cold
        run: |
          if [ ! -f "$ONNX_MODEL_DIR/model.onnx" ]; then
            poetry run python -m src.cli embed-export-onnx all-MiniLM-L6-v2 --output-dir "$ONNX_MODEL_DIR"
          fi

      - name: Scrape current 2026 jobs into Neon
        run: |
          poetry run python -m src.cli scrape-historical \
            --year 2026 \
            --resume \
            --db "$NEON_DATABASE_URL"

      - name: Sync hosted job embeddings
        run: |
          poetry run python -m src.cli embed-sync \
            --db "$NEON_DATABASE_URL" \
            --embedding-backend onnx \
            --onnx-model-dir "$ONNX_MODEL_DIR" \
            --no-update-index

      - name: Purge hosted slice
        run: |
          poetry run python -m src.cli pg-purge-hosted \
            --target "$NEON_DATABASE_URL" \
            --min-posted-date 2026-01-01 \
            --max-age-days 90

      - name: Verify hosted retention and embeddings
        run: |
          poetry run python - <<'PY'
          import os
          import psycopg

          dsn = os.environ["NEON_DATABASE_URL"]
          with psycopg.connect(dsn) as conn:
              with conn.cursor() as cur:
                  cur.execute(
                      """
                      SELECT COUNT(*)
                      FROM jobs
                      WHERE posted_date IS NULL
                         OR posted_date < GREATEST(DATE '2026-01-01', CURRENT_DATE - INTERVAL '90 days')
                      """
                  )
                  old_jobs = cur.fetchone()[0]
                  cur.execute("SELECT COUNT(*) FROM embeddings WHERE entity_type IN ('skill', 'company')")
                  non_job_embeddings = cur.fetchone()[0]
                  cur.execute("SELECT COUNT(*) FROM embeddings WHERE entity_type = 'job'")
                  job_embeddings = cur.fetchone()[0]

          if old_jobs:
              raise SystemExit(f"Hosted purge failed: {old_jobs} old/null-dated jobs remain")
          if non_job_embeddings:
              raise SystemExit(f"Hosted purge failed: {non_job_embeddings} non-job embeddings remain")
          if job_embeddings == 0:
              raise SystemExit("Hosted refresh produced zero job embeddings")

          print(f"Verified hosted slice: {job_embeddings} job embeddings, retention window enforced")
          PY
